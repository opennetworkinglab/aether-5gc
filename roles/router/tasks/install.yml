---

# TODO: running on master node for now (fix to run on multiple nodes)

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system

- name: set net.ipv4.conf.all.arp_filter to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_announce to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 10-aether-access.netdev to {{ systemd_network_dir }}/10-aether-access.netdev
  template:
    src: roles/router/templates/10-aether-access.netdev
    dest: "{{ systemd_network_dir }}/10-aether-access.netdev"
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true

- name: copy 20-aether-access.network to {{ systemd_network_dir }}/20-aether-access.network
  template:
    src: roles/router/templates/20-aether-access.network
    dest: "{{ systemd_network_dir }}/20-aether-access.network"
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true

- name: copy 10-aether-core.netdev to {{ systemd_network_dir }}/10-aether-core.netdev
  template:
    src: roles/router/templates/10-aether-core.netdev
    dest: "{{ systemd_network_dir }}/10-aether-core.netdev"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 20-aether-core.network to {{ systemd_network_dir }}/20-aether-core.network
  template:
    src: roles/router/templates/20-aether-core.network
    dest: "{{ systemd_network_dir }}/20-aether-core.network"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: Disable GRO flag on the {{ core.data_iface }} interface
  shell: ethtool -K {{ core.data_iface }} gro off
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: find {{ core.data_iface }}'s systemd-networkd file by filename
  shell: |
    find /etc/systemd/network /run/systemd/network /lib/systemd/network /usr/lib/systemd/network \
      -maxdepth 1 -type f -name '*{{ core.data_iface }}.network' -print 2>/dev/null \
      | head -n 1 \
      | xargs -r basename
  register: data_iface_network_file_cmd
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: find {{ core.data_iface }}'s active systemd-networkd file via networkctl
  shell: |
    networkctl status {{ core.data_iface }} 2>/dev/null \
      | awk -F': ' '/Network File:/ && $2 ~ /\.network$/ {print $2; exit}' \
      | xargs -r basename
  register: data_iface_network_file_networkctl
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_file_cmd.stdout | trim) == ''
  become: true

- name: set {{ core.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_cmd.stdout | trim)
        if (data_iface_network_file_cmd.stdout | trim) != ''
        else (data_iface_network_file_networkctl.stdout | default('') | trim)
      }}
  when: inventory_hostname in groups['master_nodes']

- name: set whether {{ core.data_iface }} is managed by systemd-networkd
  set_fact:
    data_iface_networkd_managed: "{{ (data_iface_network_filename | default('') | trim) is match('.*\\.network$') }}"
  when: inventory_hostname in groups['master_nodes']

- name: note direct macvlan fallback for {{ core.data_iface }}
  debug:
    msg: >-
      {{ core.data_iface }} is not managed by systemd-networkd. Falling back to direct macvlan interface setup.
  when:
    - inventory_hostname in groups['master_nodes']
    - not data_iface_networkd_managed

- name: create {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
    state: directory
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy macvlan.conf to {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf
  template:
    src: roles/router/templates/macvlan.conf
    dest: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf"
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy aether-5gc-macvlan.service to {{ systemd_system_dir }}/aether-5gc-macvlan.service
  template:
    src: roles/router/templates/aether-5gc-macvlan.service
    dest: "{{ systemd_system_dir }}/aether-5gc-macvlan.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy aether-ue-nat.service to {{ systemd_system_dir }}/aether-ue-nat.service
  template:
    src: roles/router/templates/aether-ue-nat.service
    dest: "{{ systemd_system_dir }}/aether-ue-nat.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: disable aether-5gc-macvlan.service when systemd-networkd manages {{ core.data_iface }}
  systemd:
    name: aether-5gc-macvlan.service
    enabled: false
    state: stopped
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: enable aether-5gc-macvlan.service for direct macvlan fallback
  systemd:
    name: aether-5gc-macvlan.service
    enabled: true
    state: started
  when:
    - inventory_hostname in groups['master_nodes']
    - not data_iface_networkd_managed
  become: true

- name: enable aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    enabled: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: start aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    state: started
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: install iptables-persistent package
  apt:
    name: iptables-persistent
    state: present
    update_cache: yes
  when: inventory_hostname in groups['master_nodes']
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: create /etc/iptables directory
  file:
    path: /etc/iptables
    state: directory
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: deploy 5gc iptables rules configuration
  template:
    src: roles/router/templates/5gc-iptables-rules.v4
    dest: /etc/iptables/5gc-rules.v4
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 5gc-iptables.service to {{ systemd_system_dir }}/5gc-iptables.service
  template:
    src: roles/router/templates/5gc-iptables.service
    dest: "{{ systemd_system_dir }}/5gc-iptables.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: force systemd to reread configs for 5gc-iptables service
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: enable 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    enabled: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: start 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    state: started
  when: inventory_hostname in groups['master_nodes']
  become: true

- pause:
    seconds: 15
